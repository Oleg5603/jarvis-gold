name: Build Sufler.exe

on:
  push:
    branches:
      - nutritionist
    paths:
      - 'nutritionist/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 SpeechRecognition pyaudio pyinstaller

      - name: Build exe
        working-directory: nutritionist
        run: |
          python -m PyInstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name "Sufler" `
            --hidden-import PyQt6.sip `
            --hidden-import speech_recognition `
            --hidden-import pyaudio `
            --hidden-import wave `
            --hidden-import json `
            main.py

      - name: Zip dist folder
        working-directory: nutritionist
        run: |
          Compress-Archive -Path dist\Sufler -DestinationPath dist\Sufler.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sufler-zip
          path: nutritionist/dist/Sufler.zip
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sufler-v${{ github.run_number }}
          name: "Суфлёр Нутрициолога v${{ github.run_number }}"
          body: |
            Суфлёр нутрициолога — скачай **Sufler.zip**, распакуй в любую папку, запусти **Sufler.exe**.
            Python не нужен. Нужен интернет для распознавания речи (Google).
          files: nutritionist/dist/Sufler.zip
          draft: false
          prerelease: false
