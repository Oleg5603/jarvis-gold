name: Build Sufler.exe

on:
  push:
    branches:
      - nutritionist
    paths:
      - 'nutritionist/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 SpeechRecognition pyaudio pyinstaller

      - name: Build exe
        working-directory: nutritionist
        run: |
          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "Sufler" `
            --collect-all PyQt6 `
            --hidden-import PyQt6.sip `
            --hidden-import speech_recognition `
            --hidden-import pyaudio `
            --hidden-import wave `
            --hidden-import json `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sufler-exe
          path: nutritionist/dist/Sufler.exe
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sufler-v${{ github.run_number }}
          name: "Суфлёр Нутрициолога v${{ github.run_number }}"
          body: |
            Суфлёр нутрициолога — готовый .exe файл.
            Скачай **Sufler.exe** и запусти — Python не нужен.
            Нужен интернет для распознавания речи (Google).
          files: nutritionist/dist/Sufler.exe
          draft: false
          prerelease: false
